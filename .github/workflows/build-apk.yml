name: Build Ebro APK

# This runs automatically on GitHub's own computers — you don't need
# a computer of your own. It triggers every time you push code to the
# main branch, and also lets you trigger it manually from the Actions tab.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebro-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
